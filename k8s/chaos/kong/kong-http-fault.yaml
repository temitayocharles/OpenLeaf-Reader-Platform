apiVersion: chaos-mesh.org/v1alpha1
kind: HttpChaos
metadata:
  name: kong-http-fault-injection
  annotations:
    argocd.argoproj.io/sync-wave: "90"
spec:
  mode: all
  selector:
    labelSelectors:
      chaos-target: kong-proxy
  target:
    service:
      name: kong-kong-proxy
      port: 80
  port: 80
  path: "/.*"
  delay:
    latency: "2s"
    correlation: "100"
    jitter: "500ms"
  duration: "30s"
