name: CD Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment overlay for Helm render validation"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: "Optional image tag override (defaults to git tag or short SHA)"
        required: false
        type: string
      promote_gitops:
        description: "Open a GitOps PR with updated OpenLeaf image tags"
        required: false
        default: false
        type: boolean
      gitops_repo:
        description: "GitOps repo in owner/name format"
        required: false
        default: "temitayocharles/platform-gitops"
        type: string
      gitops_base_branch:
        description: "Target base branch for GitOps PR"
        required: false
        default: "main"
        type: string
  push:
    tags:
      - "staging-*"
      - "prod-*"
      - "release-*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  resolve-release-vars:
    uses: temitayocharles/shared-workflows/.github/workflows/release-resolve-vars.yml@main
    with:
      is_dispatch: ${{ github.event_name == 'workflow_dispatch' }}
      ref_name: ${{ github.ref_name }}
      environment: ${{ github.event.inputs.environment }}
      image_tag: ${{ github.event.inputs.image_tag }}
      promote_gitops: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.promote_gitops == 'true' }}
      gitops_repo: ${{ github.event.inputs.gitops_repo }}
      gitops_base_branch: ${{ github.event.inputs.gitops_base_branch }}

  helm-validate:
    needs: resolve-release-vars
    uses: temitayocharles/shared-workflows/.github/workflows/helm-validate.yml@main
    with:
      environment: ${{ needs.resolve-release-vars.outputs.deploy_env }}
      chart_names: openleaf-config,openleaf-user-service,openleaf-services-bundle,openleaf-gateway
      artifact_name: helm-render-${{ needs.resolve-release-vars.outputs.deploy_env }}-${{ needs.resolve-release-vars.outputs.release_tag }}

  build-and-push:
    needs:
      - resolve-release-vars
      - helm-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: services/user-service
            image: openleaf-user-service
            dockerfile: services/user-service/Dockerfile
          - context: services/book-service
            image: openleaf-book-service
            dockerfile: services/book-service/Dockerfile
          - context: services/publishing-service
            image: openleaf-publishing-service
            dockerfile: services/publishing-service/Dockerfile
          - context: services/subscription-service
            image: openleaf-subscription-service
            dockerfile: services/subscription-service/Dockerfile
          - context: services/payment-service
            image: openleaf-payment-service
            dockerfile: services/payment-service/Dockerfile
          - context: services/analytics-service
            image: openleaf-analytics-service
            dockerfile: services/analytics-service/Dockerfile
          - context: frontend
            image: openleaf-frontend
            dockerfile: frontend/Dockerfile
    uses: temitayocharles/shared-workflows/.github/workflows/docker-build-push.yml@main
    with:
      registry: ghcr.io
      image_name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      tags: ${{ needs.resolve-release-vars.outputs.release_tag }},${{ needs.resolve-release-vars.outputs.deploy_env }}-latest
    secrets:
      registry_username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
      registry_password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

  release-evidence:
    needs:
      - resolve-release-vars
      - helm-validate
      - build-and-push
    uses: temitayocharles/shared-workflows/.github/workflows/release-evidence.yml@main
    with:
      deploy_env: ${{ needs.resolve-release-vars.outputs.deploy_env }}
      release_tag: ${{ needs.resolve-release-vars.outputs.release_tag }}
      image_prefix: ghcr.io/${{ github.repository_owner }}
      image_names: openleaf-user-service,openleaf-book-service,openleaf-publishing-service,openleaf-subscription-service,openleaf-payment-service,openleaf-analytics-service,openleaf-frontend
      render_artifact_name: helm-render-${{ needs.resolve-release-vars.outputs.deploy_env }}-${{ needs.resolve-release-vars.outputs.release_tag }}
      evidence_artifact_name: release-evidence-${{ needs.resolve-release-vars.outputs.deploy_env }}-${{ needs.resolve-release-vars.outputs.release_tag }}

  promote-gitops:
    needs:
      - resolve-release-vars
      - build-and-push
      - release-evidence
    if: needs.resolve-release-vars.outputs.promote_gitops == 'true'
    uses: temitayocharles/shared-workflows/.github/workflows/gitops-promote-openleaf.yml@main
    with:
      deploy_env: ${{ needs.resolve-release-vars.outputs.deploy_env }}
      release_tag: ${{ needs.resolve-release-vars.outputs.release_tag }}
      gitops_repo: ${{ needs.resolve-release-vars.outputs.gitops_repo }}
      gitops_base_branch: ${{ needs.resolve-release-vars.outputs.gitops_base_branch }}
    secrets: inherit
