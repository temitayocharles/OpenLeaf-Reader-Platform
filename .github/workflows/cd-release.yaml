name: CD Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment overlay for Helm render validation"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: "Optional image tag override (defaults to git tag or short SHA)"
        required: false
        type: string
      promote_gitops:
        description: "Open a GitOps PR with updated OpenLeaf image tags"
        required: false
        default: false
        type: boolean
      gitops_repo:
        description: "GitOps repo in owner/name format"
        required: false
        default: "temitayocharles/platform-gitops"
        type: string
      gitops_base_branch:
        description: "Target base branch for GitOps PR"
        required: false
        default: "main"
        type: string
  push:
    tags:
      - "staging-*"
      - "prod-*"
      - "release-*"

permissions:
  contents: read
  packages: write

jobs:
  resolve-release-vars:
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.vars.outputs.deploy_env }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      promote_gitops: ${{ steps.vars.outputs.promote_gitops }}
      gitops_repo: ${{ steps.vars.outputs.gitops_repo }}
      gitops_base_branch: ${{ steps.vars.outputs.gitops_base_branch }}
    steps:
      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ github.event.inputs.environment }}"
            PROMOTE_GITOPS="${{ github.event.inputs.promote_gitops }}"
            GITOPS_REPO="${{ github.event.inputs.gitops_repo }}"
            GITOPS_BASE_BRANCH="${{ github.event.inputs.gitops_base_branch }}"
            if [ -n "${{ github.event.inputs.image_tag }}" ]; then
              RELEASE_TAG="${{ github.event.inputs.image_tag }}"
            else
              RELEASE_TAG="${GITHUB_SHA::7}"
            fi
          else
            REF_TAG="${GITHUB_REF_NAME}"
            RELEASE_TAG="${REF_TAG}"
            PROMOTE_GITOPS="false"
            GITOPS_REPO="temitayocharles/platform-gitops"
            GITOPS_BASE_BRANCH="main"
            case "${REF_TAG}" in
              prod-*) DEPLOY_ENV="prod" ;;
              release-*) DEPLOY_ENV="prod" ;;
              staging-*) DEPLOY_ENV="staging" ;;
              *) DEPLOY_ENV="staging" ;;
            esac
          fi
          echo "deploy_env=${DEPLOY_ENV}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "promote_gitops=${PROMOTE_GITOPS}" >> "${GITHUB_OUTPUT}"
          echo "gitops_repo=${GITOPS_REPO}" >> "${GITHUB_OUTPUT}"
          echo "gitops_base_branch=${GITOPS_BASE_BRANCH}" >> "${GITHUB_OUTPUT}"

  openleaf-cd-release:
    needs: resolve-release-vars
    uses: temitayocharles/shared-workflows/.github/workflows/openleaf-cd-release.yml@main
    with:
      environment: ${{ needs.resolve-release-vars.outputs.deploy_env }}
      image_tag: ${{ needs.resolve-release-vars.outputs.release_tag }}
      promote_gitops: ${{ needs.resolve-release-vars.outputs.promote_gitops == 'true' }}
      gitops_repo: ${{ needs.resolve-release-vars.outputs.gitops_repo }}
      gitops_base_branch: ${{ needs.resolve-release-vars.outputs.gitops_base_branch }}
      image_owner: ${{ github.repository_owner }}
    secrets: inherit
