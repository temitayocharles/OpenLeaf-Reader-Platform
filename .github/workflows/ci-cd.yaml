name: CI/CD
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Resolve GHCR credentials
      id: ghcr-creds
      shell: bash
      env:
        GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      run: |
        if [ -n "${GHCR_TOKEN}" ]; then
          if [ -n "${GHCR_USERNAME}" ]; then
            USERNAME="${GHCR_USERNAME}"
          else
            USERNAME="${GITHUB_ACTOR}"
          fi
          PASSWORD="${GHCR_TOKEN}"
        else
          USERNAME="${GITHUB_ACTOR}"
          PASSWORD="${{ secrets.GITHUB_TOKEN }}"
        fi
        echo "username=${USERNAME}" >> "${GITHUB_OUTPUT}"
        echo "password=${PASSWORD}" >> "${GITHUB_OUTPUT}"
    - name: Login to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ steps.ghcr-creds.outputs.username }}
        password: ${{ steps.ghcr-creds.outputs.password }}
    - name: Build and Push Services
      run: |
        for svc in user book publishing subscription payment analytics; do
          cd services/${svc}-service
          docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/${{ github.repository_owner }}/openleaf-${svc}-service:latest --push .
          cd ../..
        done
    - name: Build Frontend
      run: |
        cd frontend
        docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/${{ github.repository_owner }}/openleaf-frontend:latest --push .
    - name: Scan Images
      run: |
        for img in openleaf-user-service openleaf-book-service openleaf-publishing-service openleaf-subscription-service openleaf-payment-service openleaf-analytics-service openleaf-frontend; do
          trivy image --exit-code 1 --no-progress ghcr.io/${{ github.repository_owner }}/$img:latest
        done
    - name: Test
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        for req in services/*-service/requirements.txt; do pip install -r "$req"; done
        pytest services/tests/
        cd frontend
        npm ci
        npm test -- --watchAll=false --passWithNoTests
