name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  gitleaks:
    uses: temitayocharles/shared-workflows/.github/workflows/security-gitleaks.yml@main
    with:
      fail_on_findings: true

  python-tests:
    needs: gitleaks
    uses: temitayocharles/shared-workflows/.github/workflows/tests-python.yml@main
    with:
      python-version: "3.11"
      requirements-glob: "services/*-service/requirements.txt"
      test-cmd: "pytest services/tests/"

  frontend-tests:
    needs: gitleaks
    uses: temitayocharles/shared-workflows/.github/workflows/tests-node.yml@main
    with:
      node-version: "20"
      working-directory: "frontend"
      cache-dependency-path: "frontend/package-lock.json"
      test-cmd: "npm test -- --watchAll=false --passWithNoTests"

  build-and-push:
    needs:
      - python-tests
      - frontend-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: services/user-service
            image: openleaf-user-service
            dockerfile: services/user-service/Dockerfile
          - context: services/book-service
            image: openleaf-book-service
            dockerfile: services/book-service/Dockerfile
          - context: services/publishing-service
            image: openleaf-publishing-service
            dockerfile: services/publishing-service/Dockerfile
          - context: services/subscription-service
            image: openleaf-subscription-service
            dockerfile: services/subscription-service/Dockerfile
          - context: services/payment-service
            image: openleaf-payment-service
            dockerfile: services/payment-service/Dockerfile
          - context: services/analytics-service
            image: openleaf-analytics-service
            dockerfile: services/analytics-service/Dockerfile
          - context: frontend
            image: openleaf-frontend
            dockerfile: frontend/Dockerfile
    uses: temitayocharles/shared-workflows/.github/workflows/docker-build-push.yml@main
    with:
      registry: ghcr.io
      image_name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      tags: latest
    secrets:
      registry_username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
      registry_password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

  scan-images:
    needs: build-and-push
    uses: temitayocharles/shared-workflows/.github/workflows/security-trivy.yml@main
    with:
      scan_type: image
      exit_code: "0"
      targets: ghcr.io/${{ github.repository_owner }}/openleaf-user-service:latest,ghcr.io/${{ github.repository_owner }}/openleaf-book-service:latest,ghcr.io/${{ github.repository_owner }}/openleaf-publishing-service:latest,ghcr.io/${{ github.repository_owner }}/openleaf-subscription-service:latest,ghcr.io/${{ github.repository_owner }}/openleaf-payment-service:latest,ghcr.io/${{ github.repository_owner }}/openleaf-analytics-service:latest,ghcr.io/${{ github.repository_owner }}/openleaf-frontend:latest
    secrets:
      registry_username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
      registry_password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}
