{{- if .Values.hardened.enabled }}
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-bot-early
plugin: bot-detection
config:
  deny: []
  allow: []
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-ip-block
plugin: ip-restriction
config:
  allow:
  - 127.0.0.1
  - ::1
  - 192.168.0.0/16
  deny: []
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-rate-ip
plugin: rate-limiting
config:
  minute: 60
  policy: local
  limit_by: ip
  hide_client_headers: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-jwt
plugin: jwt
config:
  uri_param_names: [jwt]
  key_claim_name: kid
  claims_to_verify: [exp, iss]
  maximum_expiration_time: 3600
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-acl
plugin: acl
config:
  allow:
  - users
  - admins
  hide_groups_header: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-validator
plugin: request-validator
config:
  version: draft4
  verbose_response: true
  allowed_content_types:
  - application/json
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: sec-transform
plugin: request-transformer
config:
  add:
    headers:
    - "X-From-Kong: secured"
    - "X-Request-Source: external"
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: trace-correlation
plugin: correlation-id
config:
  header_name: X-Trace-ID
  generator: uuid
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: opt-cache
plugin: proxy-cache
config:
  content_type:
  - application/json
  - text/plain
  cache_ttl: 120
  strategy: memory
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: resp-transform
plugin: response-transformer
config:
  add:
    headers:
    - "X-Protected-By: Kong-Hardened-Chain"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.hardened.ingress.name }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.hardened.ingress.className | quote }}
    konghq.com/plugins: {{ join "," .Values.hardened.ingress.pluginList | quote }}
spec:
  rules:
  - {{- if .Values.hardened.ingress.host }}
    host: {{ .Values.hardened.ingress.host | quote }}
    {{- end }}
    http:
      paths:
      - path: {{ .Values.hardened.ingress.path }}
        pathType: {{ .Values.hardened.ingress.pathType }}
        backend:
          service:
            name: {{ .Values.hardened.ingress.serviceName }}
            port:
              number: {{ .Values.hardened.ingress.servicePort }}
{{- end }}
