{{- range $i, $name := .Values.serviceOrder }}
{{- $svc := index $.Values.services $name }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml $.Values.imagePullSecrets | indent 8 }}
      {{- end }}
      containers:
      - name: {{ $svc.containerName }}
        image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
        imagePullPolicy: {{ $svc.image.pullPolicy }}
        ports:
        - containerPort: {{ $svc.containerPort }}
        envFrom:
{{ toYaml $.Values.commonEnvFrom | indent 8 }}
        livenessProbe:
{{ toYaml $svc.livenessProbe | indent 10 }}
        readinessProbe:
{{ toYaml $svc.readinessProbe | indent 10 }}
        resources:
{{ toYaml $svc.resources | indent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
spec:
  type: {{ $svc.service.type }}
  selector:
    app: {{ $name }}
  ports:
  - port: {{ $svc.service.port }}
    targetPort: {{ $svc.service.targetPort }}
---
{{- end }}
{{- end }}
