name: CI/CD
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and Push Services
      run: |
        for svc in user book publishing subscription payment analytics; do
          cd services/${svc}-service
          docker buildx build --platform linux/amd64,linux/arm64 -t ${{ secrets.DOCKER_USERNAME }}/${svc}-service:latest --push .
          cd ../..
        done
    - name: Build Frontend
      run: |
        cd frontend
        docker buildx build --platform linux/amd64,linux/arm64 -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest --push .
    - name: Scan Images
      run: |
        for img in user-service book-service publishing-service subscription-service payment-service analytics-service frontend; do
          trivy image --exit-code 1 --no-progress ${{ secrets.DOCKER_USERNAME }}/$img:latest
        done
    - name: Test
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        for req in services/*-service/requirements.txt; do pip install -r "$req"; done
        pytest services/tests/
        cd frontend
        npm ci
        npm test -- --watchAll=false --passWithNoTests
